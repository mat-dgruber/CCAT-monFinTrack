<!-- Botão Toggle de Ajuda -->
<button
  type="button"
  (click)="openDrawer()"
  class="inline-flex items-center justify-center p-2 text-secondary hover:text-primary hover:bg-accent-bg rounded-full transition-all focus:outline-none focus:ring-2 focus:ring-primary/20"
  title="Ajuda e Documentação"
>
  <i class="pi pi-question-circle !text-2xl"></i>
</button>

<!-- Slide-over Drawer -->
<p-drawer
  [visible]="isOpen()"
  (visibleChange)="isOpen.set($event)"
  position="right"
  [modal]="true"
  appendTo="body"
  [style]="{ width: '100%', maxWidth: '40rem' }"
  styleClass="page-help-drawer"
>
  <!-- Cabecalho Customizado via Template -->
  <ng-template pTemplate="header">
    <div class="flex items-center gap-3">
      <div class="p-2 bg-accent-bg text-primary rounded-lg">
        <i class="pi pi-book !text-xl"></i>
      </div>
      <h2 class="text-xl font-bold text-color m-0 font-serif">{{ title() }}</h2>
    </div>
  </ng-template>

  <!-- Corpo do Markdown (Scrollable) -->
  <div class="flex-1 overflow-y-auto w-full relative bg-surface-ground h-full">
    <div class="px-4 py-6 md:px-8 pb-24 min-h-full">
      <!-- Tratamento de Erro -->
      @if (hasError()) {
        <div
          class="bg-orange-500/10 border border-orange-500/20 rounded-xl p-6 flex flex-col items-center justify-center text-center mt-8 animate-shake"
        >
          <i class="pi pi-exclamation-triangle !text-4xl text-orange-500 mb-3"></i>
          <h3 class="text-lg font-bold text-color mb-2">Manual indisponível</h3>
          <p class="text-secondary text-sm">
            Não foi possível carregar a documentação (<code>{{
              document()
            }}</code
            >). Verifique se o arquivo Markdown foi criado na pasta pública
            corretamente.
          </p>
        </div>
      }

      <!-- Renderizador do ngx-markdown -->
      <markdown
        [src]="documentUrl()"
        (load)="onLoad($event)"
        (error)="onError($event)"
        class="prose prose-sm md:prose-base prose-slate dark:prose-invert max-w-none prose-headings:text-color prose-headings:font-bold prose-headings:font-serif prose-h1:text-2xl prose-h1:border-b prose-h1:border-surface-border prose-h1:pb-2 prose-h1:mt-0 prose-a:text-primary prose-a:no-underline hover:prose-a:underline prose-blockquote:border-l-4 prose-blockquote:border-primary/50 prose-blockquote:bg-accent-bg prose-blockquote:py-2 prose-blockquote:px-5 prose-blockquote:not-italic prose-blockquote:rounded-r-lg [&_.markdown-alert-warning]:border-l-4 [&_.markdown-alert-warning]:border-amber-400 [&_.markdown-alert-warning]:bg-amber-500/10 [&_.markdown-alert-warning]:text-color [&_.markdown-alert-warning_p]:m-0"
      ></markdown>
    </div>
  </div>
</p-drawer>
