<div class="min-h-screen bg-surface-hover flex items-center justify-center p-4">
  <p-card
    [style]="{ width: '100%', maxWidth: '450px' }"
    styleClass="shadow-lg border-none text-center"
  >
    @if (status() === "loading") {
      <div class="flex flex-col items-center gap-4 py-8">
        <p-skeleton shape="circle" size="5rem" styleClass="mb-2"></p-skeleton>
        <p-skeleton
          width="200px"
          height="1.5rem"
          styleClass="mb-2"
        ></p-skeleton>
        <p-skeleton width="300px" height="1rem"></p-skeleton>
      </div>
    }
    @if (status() === "success") {
      <div class="flex flex-col items-center gap-4 py-4">
        <div
          class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center text-green-600 mb-2 animate-bounce"
        >
          <i class="pi pi-check text-4xl font-bold"></i>
        </div>

        <h2 class="text-2xl font-bold text-color">E-mail Confirmado!</h2>
        <p class="text-secondary mb-4">
          Sua conta foi ativada com sucesso. Agora você pode acessar o
          monFinTrack.
        </p>

        <p-button
          label="Ir para o Login"
          (onClick)="goToLogin()"
          styleClass="w-full"
        ></p-button>
      </div>
    }
    @if (status() === "error") {
      <div class="flex flex-col items-center gap-4 py-4">
        <div
          class="w-20 h-20 rounded-full bg-red-100 flex items-center justify-center text-red-600 mb-2"
        >
          <i class="pi pi-times text-4xl font-bold"></i>
        </div>

        <h2 class="text-2xl font-bold text-color">Ops! Algo deu errado.</h2>
        <p class="text-red-500 mb-4">{{ errorMessage() }}</p>

        <p-button
          label="Tentar Novamente"
          (onClick)="retry()"
          styleClass="p-button-success w-full mb-2"
        ></p-button>

        @if (isLoggedIn()) {
          <p-button
            label="Reenviar E-mail"
            (onClick)="resendEmail()"
            [loading]="status() === 'resending'"
            styleClass="p-button-outlined p-button-secondary w-full mb-4"
          ></p-button>
        }

        <p-button
          label="Voltar ao Início"
          (onClick)="goToLogin()"
          styleClass="p-button-text p-button-secondary w-full"
        ></p-button>
      </div>
    }
  </p-card>
</div>
